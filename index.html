<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animação de Fundo</title>
    <style>
        /* Zera as margens padrão do navegador */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Configuração do fundo roxo e alinhamento do texto */
        body {
            background-color: #000000; /* Tom de roxo escuro e vibrante */
            width: 100%;
            height: 100vh;
            overflow: hidden; /* Impede que a tela crie barra de rolagem */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace; /* Fonte solicitada */
        }

        /* Estilo do texto central */
        .texto-central {
            z-index: 10; /* Garante que o texto fique por cima dos quadrados */
            color: #ffffff;
            text-align: center;
        }

        .texto-central h1 {
            font-size: 3rem;
            font-weight: normal;
            padding: 20px 0; /* Espaçamento entre o texto e as barras */
            border-top: 3px solid #ffffff; /* Barra superior */
            border-bottom: 3px solid #ffffff; /* Barra inferior */
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* Container dos quadrados animados */
        .quadrados {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Fica atrás do texto */
        }

        /* Estilo base de cada quadrado */
        .quadrados li {
            position: absolute;
            display: block;
            list-style: none;
            width: 20px;
            height: 20px;
            /* Cor azul base com transparência (efeito bolha de sabão) */
            background: rgba(0, 150, 255, 0.4);
            animation: subir 25s linear infinite;
            bottom: -150px; /* Começam fora da tela por baixo */
            backdrop-filter: blur(2px); /* Dá um desfoque charmoso atrás deles */
        }

        /* Configurações individuais de tamanho, posição, cor e velocidade */
        .quadrados li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; background: rgba(0, 191, 255, 0.5); }
        .quadrados li:nth-child(2) { left: 10%; width: 30px; height: 30px; animation-delay: 2s; animation-duration: 12s; background: rgba(135, 206, 235, 0.6); }
        .quadrados li:nth-child(3) { left: 70%; width: 40px; height: 40px; animation-delay: 4s; background: rgba(70, 130, 180, 0.4); }
        .quadrados li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; background: rgba(0, 0, 255, 0.3); }
        .quadrados li:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; background: rgba(30, 144, 255, 0.7); }
        .quadrados li:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; background: rgba(100, 149, 237, 0.5); }
        .quadrados li:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; background: rgba(0, 206, 209, 0.4); }
        .quadrados li:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; background: rgba(173, 216, 230, 0.6); }
        .quadrados li:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; background: rgba(0, 255, 255, 0.5); }
        .quadrados li:nth-child(10) { left: 85%; width: 130px; height: 130px; animation-delay: 0s; animation-duration: 11s; background: rgba(65, 105, 225, 0.4); }

        /* Animação que faz os quadrados subirem e girarem levemente */
        @keyframes subir {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
                border-radius: 0;
            }
            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
                border-radius: 20%; /* Arredonda levemente as pontas no final para parecer mais com uma bolha */
            }
        }
    </style>
</head>
<body>

    <ul class="quadrados">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>

    <div class="texto-central">
        <h1>background animation</h1>
    </div>

</body>
</html>
